<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA 테스트 체크리스트</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f0e8;
    color: #2c2c2c;
    font-size: 14px;
    line-height: 1.6;
  }

  a { color: inherit; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #fff;
    border: 1px solid #d4cfc5;
    padding: 48px 56px;
    width: 360px;
  }
  .login-box h1 {
    font-size: 18px;
    font-weight: normal;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .login-box p {
    font-size: 12px;
    color: #888;
    margin-bottom: 32px;
  }
  .login-box input[type="text"] {
    width: 100%;
    border: none;
    border-bottom: 1px solid #ccc;
    background: transparent;
    padding: 8px 0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 24px;
  }
  .login-box input[type="text"]:focus {
    border-bottom-color: #2c2c2c;
  }
  .btn-primary {
    width: 100%;
    background: #2c2c2c;
    color: #f5f0e8;
    border: none;
    padding: 10px 0;
    font-size: 13px;
    font-family: inherit;
    letter-spacing: 0.06em;
    cursor: pointer;
  }
  .btn-primary:hover { background: #444; }

  /* ── LAYOUT ── */
  #appScreen { display: none; }

  .top-bar {
    background: #fff;
    border-bottom: 1px solid #d4cfc5;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar-left { display: flex; align-items: center; gap: 20px; }
  .top-bar h1 { font-size: 15px; font-weight: normal; letter-spacing: 0.04em; }
  .user-badge {
    font-size: 12px;
    color: #888;
    border: 1px solid #ddd;
    padding: 3px 10px;
  }
  .top-bar-right { display: flex; align-items: center; gap: 12px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-bar-wrap { width: 120px; height: 4px; background: #e8e4dc; }
  .progress-bar-fill { height: 100%; background: #2c2c2c; transition: width 0.3s; }

  .main-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ── ADMIN VIEW ── */
  .admin-header {
    margin-bottom: 24px;
  }
  .admin-header h2 {
    font-size: 16px;
    font-weight: normal;
    margin-bottom: 4px;
  }
  .admin-header p { font-size: 12px; color: #888; }

  .admin-summary {
    margin-bottom: 12px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .admin-summary-item { font-size: 12px; color: #888; }
  .admin-summary-item strong { color: #2c2c2c; }

  .admin-table-wrap {
    overflow-x: auto;
    border: 1px solid #d4cfc5;
    margin-bottom: 40px;
  }
  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
  }
  .admin-table th {
    background: #f5f0e8;
    border-bottom: 1px solid #d4cfc5;
    padding: 8px 12px;
    text-align: left;
    font-weight: normal;
    color: #666;
    position: sticky;
    top: 0;
  }
  .admin-table th.user-col {
    text-align: center;
    min-width: 80px;
  }
  .admin-table td {
    border-bottom: 1px solid #ece8e0;
    padding: 7px 12px;
    vertical-align: middle;
  }
  .admin-table td.user-cell { text-align: center; }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: #faf8f4; }
  .admin-table .section-row td {
    background: #f5f0e8;
    font-size: 11px;
    color: #888;
    padding: 5px 12px;
    border-bottom: 1px solid #d4cfc5;
  }
  .admin-table .tc-id { color: #888; font-size: 11px; }
  .cell-pass { color: #2a7a2a; font-weight: bold; font-size: 11px; }
  .cell-fail { color: #c0392b; font-weight: bold; font-size: 11px; }
  .cell-none { color: #bbb; font-size: 11px; }
  .cell-comment-btn {
    display: inline-block;
    margin-top: 4px;
    font-size: 10px;
    color: #888;
    background: #f0ece4;
    border: 1px solid #d4cfc5;
    padding: 1px 6px;
    cursor: pointer;
    border-radius: 2px;
  }
  .cell-comment-btn:hover { background: #e8e4dc; }

  /* 코멘트 모달 */
  .comment-modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .comment-modal-overlay.show { display: flex; }
  .comment-modal {
    background: #fff;
    border: 1px solid #d4cfc5;
    padding: 28px 32px;
    width: 420px;
    max-width: 90vw;
  }
  .comment-modal-title {
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 16px;
    color: #2c2c2c;
  }
  .comment-modal-row { margin-bottom: 12px; }
  .comment-modal-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .comment-modal-text { font-size: 13px; color: #2c2c2c; line-height: 1.6; white-space: pre-wrap; }
  .comment-modal-close {
    margin-top: 20px;
    width: 100%;
    background: #2c2c2c;
    color: #f5f0e8;
    border: none;
    padding: 9px 0;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .comment-modal-close:hover { background: #444; }

  .admin-detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .btn-back {
    background: none;
    border: 1px solid #ccc;
    padding: 5px 14px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-back:hover { background: #f0ece4; }

  /* ── SECTION ── */
  .section-block {
    margin-bottom: 48px;
  }
  .section-title {
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #888;
    text-transform: uppercase;
    border-bottom: 1px solid #d4cfc5;
    padding-bottom: 8px;
    margin-bottom: 0;
  }

  /* ── TEST ITEM ── */
  .test-item {
    border-bottom: 1px solid #e8e4dc;
    padding: 14px 0;
  }
  .test-item:last-child { border-bottom: none; }

  .test-item-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .test-item-num {
    font-size: 11px;
    color: #aaa;
    min-width: 36px;
    padding-top: 1px;
    flex-shrink: 0;
  }
  .test-item-desc {
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
  }
  .test-item-desc .step-num {
    display: inline-block;
    font-size: 11px;
    color: #aaa;
    margin-right: 4px;
  }
  .check-group {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    align-items: flex-start;
    padding-top: 2px;
  }
  .check-btn {
    border: 1px solid #ccc;
    background: #fff;
    padding: 3px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .check-btn.pass-btn:hover, .check-btn.pass-btn.active {
    background: #2c2c2c;
    color: #f5f0e8;
    border-color: #2c2c2c;
  }
  .check-btn.fail-btn:hover, .check-btn.fail-btn.active {
    background: #c0392b;
    color: #fff;
    border-color: #c0392b;
  }

  .fail-reason {
    margin-top: 8px;
    margin-left: 52px;
    display: none;
  }
  .fail-reason input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #e0a090;
    background: #fff9f8;
    padding: 6px 0;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .fail-reason input:focus { border-bottom-color: #c0392b; }
  .fail-reason input::placeholder { color: #ccc; }

  /* ── REMARK ── */
  .remark-row {
    margin-top: 10px;
    margin-left: 52px;
  }
  .remark-row textarea {
    width: 100%;
    border: 1px solid #e8e4dc;
    background: #faf8f4;
    padding: 8px 10px;
    font-size: 12px;
    font-family: inherit;
    resize: vertical;
    min-height: 52px;
    outline: none;
    color: #2c2c2c;
  }
  .remark-row textarea:focus { border-color: #bbb; }
  .remark-row textarea::placeholder { color: #ccc; }

  /* ── STATUS BADGES ── */
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid;
  }
  .badge-pass { color: #2c7a3a; border-color: #2c7a3a; background: #f0faf2; }
  .badge-fail { color: #c0392b; border-color: #c0392b; background: #fff5f4; }
  .badge-pending { color: #999; border-color: #ddd; background: #fafafa; }

  /* ── SAVE BAR ── */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #d4cfc5;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .save-bar-info { font-size: 12px; color: #888; }

  .toast {
    position: fixed;
    bottom: 60px;
    right: 32px;
    background: #2c2c2c;
    color: #f5f0e8;
    padding: 10px 20px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* read-only mode for admin */
  .readonly-mode .check-btn { pointer-events: none; opacity: 0.7; }
  .readonly-mode .fail-reason input { pointer-events: none; }
  .readonly-mode .remark-row textarea { pointer-events: none; }
  .readonly-mode .save-bar { display: none; }

  .loading { text-align: center; padding: 60px; color: #999; font-size: 13px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>QA 테스트 체크리스트</h1>
    <p>사용자명을 입력하고 시작하세요</p>
    <input type="text" id="usernameInput" placeholder="사용자명" autofocus>
    <button class="btn-primary" onclick="login()">시작하기</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="top-bar">
    <div class="top-bar-left">
      <h1>QA 테스트 체크리스트</h1>
      <span class="user-badge" id="userBadge"></span>
    </div>
    <div class="top-bar-right">
      <span class="progress-label" id="progressLabel">0 / 0</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="loading">불러오는 중...</div>
  </div>

  <div class="save-bar" id="saveBar" style="display:none">
    <span class="save-bar-info" id="saveInfo">마지막 저장: -</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 코멘트 모달 -->
<div class="comment-modal-overlay" id="commentModalOverlay" onclick="closeCommentModal(event)">
  <div class="comment-modal">
    <div class="comment-modal-title" id="commentModalTitle"></div>
    <div id="commentModalBody"></div>
    <button class="comment-modal-close" onclick="closeCommentModal()">닫기</button>
  </div>
</div>

let currentUser = '';

let results = {};   // { itemId: { status:'pass'|'fail'|null, reason:'', remark:'' } }

// ── Test Data ─────────────────────────────────────────────

      { id: 'ps-list-05', tc: 'TC-PS-L-05', steps: ['검색 타입 고객사명 선택 + 검색어 존재하지않는고객사 입력 후 조회', '목록이 비어있는지 확인'] },

      { id: 'ps-new-02', tc: 'TC-PS-N-02', steps: ['프로젝트ID 구분 드롭다운에서 G(정부과제) 선택', '정부과제가 선택된 상태로 표시되는지 확인'] },

      { id: 'wr-edit-02', tc: 'TC-WR-E-02', steps: ['업무내용 테이블의 추가 버튼 클릭 → 새 행 1개가 추가되는지 확인', '삭제 버튼 클릭 → 해당 행이 제거되는지 확인'] },
      { id: 'wr-edit-03', tc: 'TC-WR-E-03', steps: ['업무구분에서 프로젝트 선택 → 프로젝트명 드롭다운이 활성화되는지 확인', '업무구분에서 부서업무 선택 → 프로젝트명 드롭다운이 비활성화(선택 불가)인지 확인', '업무구분에서 연차 선택 → 프로젝트명 드롭다운이 비활성화인지 확인'] },

// ── Login ──────────────────────────────────────────────────
function login() {
  const val = document.getElementById('usernameInput').value.trim();
  if (!val) return;
  currentUser = val;
  isAdmin = (val === 'hphong');
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userBadge').textContent = currentUser + (isAdmin ? ' (관리자)' : '');
  if (isAdmin) {
    renderAdmin();
  } else {
    loadAndRenderChecklist(currentUser, false);
  }
}
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// URL 어디에든 hphong 이 들어가면 자동 로그인 (path/hash/query 모두 지원)
if (location.pathname.includes('hphong')
    || location.hash.includes('hphong')
    || location.search.includes('hphong')) {
  document.getElementById('usernameInput').value = 'hphong';
  login();
}

// ── Admin ──────────────────────────────────────────────────
async function renderAdmin() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="loading">사용자 목록 불러오는 중...</div>';
  document.getElementById('saveBar').style.display = 'none';

  try {
    const snapshot = await checklistCol.get();
    const users = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.username) users[d.username] = d;
    });

    const userNames = Object.keys(users);
    const totalTc = SECTIONS.reduce((a, s) => a + s.items.length, 0);

    // 사용자별 전체 집계
    const userStats = {};
    userNames.forEach(uname => {
      const res = users[uname].results || {};
      let pass = 0, fail = 0;
      SECTIONS.forEach(s => s.items.forEach(item => {
        if (res[item.id]?.status === 'pass') pass++;
        if (res[item.id]?.status === 'fail') fail++;
      }));
      userStats[uname] = { pass, fail, done: pass + fail };
    });

    let html = `<div class="admin-header">
      <h2>전체 테스트 현황</h2>
      <p>${userNames.length}명 · 총 ${totalTc}개 TC</p>
    </div>`;

    if (userNames.length === 0) {
      html += '<div class="loading" style="padding:40px">아직 작성한 사용자가 없습니다</div>';
      mc.innerHTML = html;
      return;
    }

    // 사용자별 요약 바
    html += '<div class="admin-summary">';
    userNames.forEach(uname => {
      const s = userStats[uname];
      const pct = Math.round(s.done / totalTc * 100);
      html += `<div class="admin-summary-item">
        <strong>${uname}</strong> &nbsp;PASS ${s.pass} · FAIL ${s.fail} · ${pct}%
      </div>`;
    });
    html += '</div>';

    // TC × 사용자 집계 테이블
    html += '<div class="admin-table-wrap"><table class="admin-table"><thead><tr>';
    html += '<th>TC</th><th style="min-width:300px">내용</th>';
    userNames.forEach(uname => {
      html += `<th class="user-col">${uname}</th>`;
    });
    html += '</tr></thead><tbody>';

    SECTIONS.forEach(sec => {
      html += `<tr class="section-row"><td colspan="${2 + userNames.length}">${sec.title}</td></tr>`;
      sec.items.forEach(item => {
        html += `<tr>
          <td class="tc-id">${item.tc}</td>
          <td>${item.steps[0]}</td>`;
        userNames.forEach(uname => {
          const res = users[uname].results || {};
          const st = res[item.id]?.status;
          const entry = res[item.id] || {};
          const reason = (entry.reason || '').replace(/'/g, '&#39;');
          const remark = (entry.remark || '').replace(/'/g, '&#39;');
          const hasComment = reason || remark;
          const badge = st === 'pass'
            ? '<span class="cell-pass">PASS</span>'
            : st === 'fail'
              ? '<span class="cell-fail">FAIL</span>'
              : '<span class="cell-none">-</span>';
          const btn = hasComment
            ? `<br><button class="cell-comment-btn" onclick="openCommentModal('${item.tc}','${uname}','${reason}','${remark}')">💬 메모</button>`
            : '';
          html += `<td class="user-cell">${badge}${btn}</td>`;
        });
        html += '</tr>';
      });

      // 섹션 그밖의 비고사항 행
      const secRemarkKey = '__remark__' + sec.id;
      const hasAnySecRemark = userNames.some(u => (users[u].results || {})[secRemarkKey]);
      if (hasAnySecRemark) {
        html += `<tr><td class="tc-id" style="color:#aaa">비고</td><td style="font-size:11px;color:#aaa">그밖의 비고사항</td>`;
        userNames.forEach(uname => {
          const sr = ((users[uname].results || {})[secRemarkKey] || '').replace(/'/g, '&#39;');
          const btn = sr
            ? `<button class="cell-comment-btn" onclick="openCommentModal('그밖의 비고사항','${uname}','','${sr}')">💬 보기</button>`
            : '<span class="cell-none">-</span>';
          html += `<td class="user-cell">${btn}</td>`;
        });
        html += '</tr>';
      }
    });

    html += '</tbody></table></div>';
    mc.innerHTML = html;
  } catch(e) {
    mc.innerHTML = '<div class="loading">불러오기 실패: ' + e.message + '</div>';
  }
}

// ── Comment Modal ─────────────────────────────────────────
function openCommentModal(tc, uname, reason, remark) {
  document.getElementById('commentModalTitle').textContent = `${tc} — ${uname}`;
  let body = '';
  if (reason) body += `<div class="comment-modal-row"><div class="comment-modal-label">실패 사유</div><div class="comment-modal-text">${reason}</div></div>`;
  if (remark) body += `<div class="comment-modal-row"><div class="comment-modal-label">비고</div><div class="comment-modal-text">${remark}</div></div>`;
  document.getElementById('commentModalBody').innerHTML = body;
  document.getElementById('commentModalOverlay').classList.add('show');
}
function closeCommentModal(e) {
  if (e && e.target !== document.getElementById('commentModalOverlay')) return;
  document.getElementById('commentModalOverlay').classList.remove('show');
}

// ── Load & Render Checklist ────────────────────────────────
async function loadAndRenderChecklist(username, readonly) {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="loading">체크리스트 불러오는 중...</div>';

  try {
    const doc = await checklistCol.doc(username).get();
    results = doc.exists ? (doc.data().results || {}) : {};
    lastSaved = doc.exists ? doc.data().updatedAt : null;
  } catch(e) {
    results = {};
  }

  renderChecklist(readonly);
  updateProgress();

  if (!readonly) {
    document.getElementById('saveBar').style.display = 'flex';
    updateSaveInfo();
  } else {
    document.getElementById('saveBar').style.display = 'none';
  }
}

function renderChecklist(readonly) {
  const mc = document.getElementById('mainContent');
  if (readonly) mc.classList.add('readonly-mode');
  else mc.classList.remove('readonly-mode');

  let html = '';

  SECTIONS.forEach(sec => {
    html += `<div class="section-block">
      <div class="section-title">${sec.title}</div>`;
    sec.items.forEach((item, idx) => {
      const r = results[item.id] || { status: null, reason: '', remark: '' };
      const statusBadge = r.status === 'pass'
        ? '<span class="badge badge-pass">PASS</span>'
        : r.status === 'fail'
          ? '<span class="badge badge-fail">FAIL</span>'
          : '<span class="badge badge-pending">미완료</span>';

      const stepsHtml = item.steps.map((s, i) =>
        `<span class="step-num">${i + 1}.</span>${s}<br>`
      ).join('');

      const failDisplay = r.status === 'fail' ? 'block' : 'none';
      const passActive = r.status === 'pass' ? 'active' : '';
      const failActive = r.status === 'fail' ? 'active' : '';

      html += `<div class="test-item" id="item-${item.id}">
        <div class="test-item-row">
          <div class="test-item-num">${item.tc}</div>
          <div class="test-item-desc">${stepsHtml}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px">
            ${statusBadge}
            <div class="check-group">
              <button class="check-btn pass-btn ${passActive}" onclick="setStatus('${item.id}','pass')">PASS</button>
              <button class="check-btn fail-btn ${failActive}" onclick="setStatus('${item.id}','fail')">FAIL</button>
            </div>
          </div>
        </div>
        <div class="fail-reason" id="fail-${item.id}" style="display:${failDisplay}">
          <input type="text" placeholder="실패 사유를 입력하세요" value="${r.reason || ''}"
            oninput="setReason('${item.id}', this.value)">
        </div>
        <div class="remark-row">
          <textarea placeholder="비고 (선택사항)" oninput="setRemark('${item.id}', this.value)">${r.remark || ''}</textarea>
        </div>
      </div>`;
    });

    // 섹션 하단 비고
    const secRemarkKey = '__remark__' + sec.id;
    const secRemark = results[secRemarkKey] || '';
    html += `<div class="remark-row" style="padding: 4px 16px 16px;">
      <label style="font-size:11px;color:#888;display:block;margin-bottom:4px">그밖의 비고사항</label>
      <textarea placeholder="섹션 전체에 대한 기타 비고를 입력하세요" oninput="setSectionRemark('${sec.id}', this.value)">${secRemark}</textarea>
    </div>`;
    html += '</div>';
  });

  mc.innerHTML = html;
}

// ── Auto-save ──────────────────────────────────────────────
let debounceTimer = null;

function autoSave() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => saveAll(true), 3000);
}

// ── Interactions ───────────────────────────────────────────
function setStatus(itemId, status) {
  if (!results[itemId]) results[itemId] = { status: null, reason: '', remark: '' };
  results[itemId].status = status;

  // badge 갱신
  const itemEl = document.getElementById('item-' + itemId);
  const badge = itemEl.querySelector('.badge');
  badge.className = status === 'pass' ? 'badge badge-pass' : 'badge badge-fail';
  badge.textContent = status === 'pass' ? 'PASS' : 'FAIL';

  // button active
  itemEl.querySelector('.pass-btn').classList.toggle('active', status === 'pass');
  itemEl.querySelector('.fail-btn').classList.toggle('active', status === 'fail');

  // fail reason
  const failEl = document.getElementById('fail-' + itemId);
  failEl.style.display = status === 'fail' ? 'block' : 'none';
  if (status === 'pass') results[itemId].reason = '';

  updateProgress();
  saveAll(true); // 체크 즉시 저장
}

function setReason(itemId, val) {
  if (!results[itemId]) results[itemId] = { status: null, reason: '', remark: '' };
  results[itemId].reason = val;
  autoSave();
}

function setRemark(itemId, val) {
  if (!results[itemId]) results[itemId] = { status: null, reason: '', remark: '' };
  results[itemId].remark = val;
  autoSave();
}

function setSectionRemark(secId, val) {
  results['__remark__' + secId] = val;
  autoSave();
}

function updateProgress() {
  let total = 0, done = 0;
  SECTIONS.forEach(s => s.items.forEach(item => {
    total++;
    if (results[item.id]?.status) done++;
  }));
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = total ? (done / total * 100) + '%' : '0%';
}

// ── Save ───────────────────────────────────────────────────
async function saveAll(silent = false) {
  try {
    await checklistCol.doc(currentUser).set({
      username: currentUser,
      results: results,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    lastSaved = new Date();
    updateSaveInfo();
  } catch(e) {
    showToast('저장 실패: ' + e.message);
  }
}

function updateSaveInfo() {
  const el = document.getElementById('saveInfo');
  if (lastSaved) {
    const d = lastSaved.toDate ? lastSaved.toDate() : lastSaved;
    el.textContent = '마지막 저장: ' + d.toLocaleString('ko-KR');
  } else {
    el.textContent = '아직 저장하지 않았습니다';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
